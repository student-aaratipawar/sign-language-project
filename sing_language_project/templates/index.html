<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Language Recognition</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body {
      background: linear-gradient(135deg, #0d0d0d, #1c1c1c);
      color: white;
      font-family: "Segoe UI", Arial, sans-serif;
      text-align: center;
      padding-top: 100px;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      color: #00ffcc;
    }

    p {
      font-size: 1.2em;
      color: #cccccc;
      margin-bottom: 40px;
    }

    .btn {
      display: inline-block;
      background: #007bff;
      color: white;
      padding: 14px 28px;
      margin: 10px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.1em;
      transition: 0.3s;
      box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
    }

    .btn:hover {
      background: #0056b3;
      transform: scale(1.05);
    }

    footer {
      margin-top: 100px;
      font-size: 0.9em;
      color: #888;
    }
  </style>
</head>
<body>

  <h1>🖐 Sign Language Recognition System</h1>
  <p>Recognize hand gestures in real-time or from images using a trained AI model.</p>

  <div>
    <a href="/train" class="btn">📚 Train Model</a>
    <a href="/detect" class="btn">🎥 Live Detection</a>
    <a href="/upload" class="btn">📸 Upload Image</a>
  </div>

  <footer>
    <p>Developed with ❤️ using Flask, OpenCV, and MediaPipe</p>
  </footer>

</body>
</html>
